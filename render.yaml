# One-click config for deploying to Render (render.com).
# Create a new "Blueprint" from your Git repo and Render reads this file.
services:
  - type: web
    name: valmer-content-storyboard
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Login for the site. Username defaults to "valmer"; set a password in the
      # Render dashboard (it stays out of the repo). Leaving APP_PASSWORD unset = open site.
      - key: APP_USER
        value: valmer
      - key: APP_PASSWORD
        sync: false
