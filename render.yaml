# Deploy to Render (render.com): New → Blueprint → pick this repo.
services:
  - type: web
    name: valmer-content-storyboard
    runtime: node
    plan: starter # a persistent disk (below) needs a paid instance; free tier loses data on redeploy
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/data.db
