# Deploy to Render (render.com): New → Blueprint → pick this repo.
# Free web service + free Postgres = $0. (Render's free Postgres is removed after
# 90 days unless upgraded; the web service sleeps after inactivity and cold-starts.)
databases:
  - name: valmer-db
    plan: free

services:
  - type: web
    name: valmer-content-storyboard
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: valmer-db
          property: connectionString
